basePath: /auth/api
definitions:
  models.AccessRefreshTokens:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  models.AddUserRequest:
    properties:
      access_level:
        example: 50
        type: integer
      password:
        example: password
        type: string
      username:
        example: username
        type: string
      uuid:
        example: 4b6c34bd-01f0-4fbe-be65-217984b3e33d
        type: string
    type: object
  models.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  models.LoginData:
    properties:
      password:
        example: password
        type: string
      username:
        example: username
        type: string
    type: object
  models.RefreshRequest:
    properties:
      refresh_token:
        example: 4b6c34bd-01f0-4fbe-be65-217984b3e33d
        type: string
    type: object
  models.RegData:
    properties:
      password:
        example: password
        type: string
      username:
        example: username
        type: string
    type: object
  models.ResponseAPI:
    properties:
      errors:
        $ref: '#/definitions/models.ErrorResponse'
      message:
        type: string
      requestId:
        type: string
      result: {}
      success:
        type: boolean
    type: object
  models.UpdateUserRequest:
    properties:
      access_level:
        example: 50
        type: integer
      username:
        example: username
        type: string
    type: object
  models.User:
    properties:
      access_level:
        example: 100
        type: integer
      password:
        example: password
        type: string
      username:
        example: username
        type: string
      uuid:
        example: 4b6c34bd-01f0-4fbe-be65-217984b3e33d
        type: string
    type: object
  models.UserResponse:
    properties:
      uuid:
        example: 4b6c34bd-01f0-4fbe-be65-217984b3e33d
        type: string
    type: object
info:
  contact: {}
  description: Documentation for authentication/authorization API service
  title: JWT authentication/authorization service
  version: 1.0.0
paths:
  /v1/login:
    post:
      consumes:
      - application/json
      description: Getting JWT token using credentials
      parameters:
      - description: Login data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginData'
      produces:
      - application/json
      responses:
        "200":
          description: RefreshSession successfully created
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.AccessRefreshTokens'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      summary: Logging in
      tags:
      - auth
  /v1/refresh:
    post:
      consumes:
      - application/json
      description: Refreshing tokens using a refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens successfully refreshed
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.AccessRefreshTokens'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      summary: Refreshing tokens
      tags:
      - auth
  /v1/reg:
    post:
      consumes:
      - application/json
      description: Adding user to db
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegData'
      produces:
      - application/json
      responses:
        "200":
          description: User successfully created
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.UserResponse'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      summary: User registration
      tags:
      - auth
  /v1/users:
    get:
      consumes:
      - application/json
      description: Getting a list of all users
      produces:
      - application/json
      responses:
        "200":
          description: User data has been successfully received
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/models.User'
                  type: array
              type: object
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Getting users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creating a new user
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User successfully created
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.UserResponse'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Conflict when creating user
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Creating a user
      tags:
      - users
  /v1/users/{uuid}:
    delete:
      consumes:
      - application/json
      description: Deleting a user by their UUID
      parameters:
      - description: User UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User successfully deleted
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.UserResponse'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "404":
          description: User was not found
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Conflict when deleting user
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Deleting user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updating user information by their UUID
      parameters:
      - description: User uuid
        in: path
        name: uuid
        required: true
        type: string
      - description: User update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User data has been successfully updated
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.UserResponse'
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "404":
          description: User was not found
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "409":
          description: Conflict when updating user
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Updating user
      tags:
      - users
  /v1/users/accesslevel/{access_level}:
    get:
      consumes:
      - application/json
      description: Getting information about users whose access level is lower or
        equal to the specified one
      parameters:
      - description: User access level
        in: path
        name: access_level
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User data has been successfully received
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/models.User'
                  type: array
              type: object
        "404":
          description: User was not found
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Получение пользователей по уровню доступа
      tags:
      - users
  /v1/users/username/{username}:
    get:
      consumes:
      - application/json
      description: Getting information about a user by their username
      parameters:
      - description: username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User data has been successfully received
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  items:
                    $ref: '#/definitions/models.User'
                  type: array
              type: object
        "404":
          description: User was not found
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Getting a user by username
      tags:
      - users
  /v1/users/uuid/{uuid}:
    get:
      consumes:
      - application/json
      description: Getting information about a user by their UUID
      parameters:
      - description: User UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User data has been successfully received
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  $ref: '#/definitions/models.User'
              type: object
        "404":
          description: User was not found
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Getting a user by UUID
      tags:
      - users
  /v1/verify:
    get:
      consumes:
      - application/json
      description: Verification of the token in the Authorization header
      produces:
      - application/json
      responses:
        "200":
          description: Token is valid
          schema:
            allOf:
            - $ref: '#/definitions/models.ResponseAPI'
            - properties:
                result:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: Bad request format
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "401":
          description: Token is invalid
          schema:
            $ref: '#/definitions/models.ResponseAPI'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ResponseAPI'
      security:
      - ApiKeyAuth: []
      summary: Token verification
      tags:
      - auth
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
